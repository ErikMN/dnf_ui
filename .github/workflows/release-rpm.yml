name: Release RPM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rpm:
    name: Fedora RPM
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build RPM in Fedora
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD:/workspace" \
            -w /workspace \
            fedora:latest \
            bash -lc '
              set -euo pipefail
              trap '\''chown -R "${HOST_UID}:${HOST_GID}" rpmbuild artifacts dnf-ui-latest.rpm dnf-ui-latest.src.rpm 2>/dev/null || true'\'' EXIT

              dnf -y install \
                appstream \
                catch-devel \
                dbus-daemon \
                desktop-file-utils \
                gcc-c++ \
                git \
                glib2-devel \
                gtk4-devel \
                libdnf5-devel \
                make \
                meson \
                ninja-build \
                polkit-devel \
                rpm-build \
                systemd-devel \
                systemd-rpm-macros

              git config --global --add safe.directory /workspace
              make rpm

              mkdir -p artifacts
              cp -L dnf-ui-latest.rpm artifacts/
              cp -L dnf-ui-latest.src.rpm artifacts/
            '

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dnf-ui-rpm-${{ github.run_number }}
          path: artifacts/*.rpm
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.rpm
