name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Fedora build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and test in Fedora
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD:/workspace" \
            -w /workspace \
            fedora:latest \
            bash -lc '
              set -euo pipefail
              trap '\''chown -R "${HOST_UID}:${HOST_GID}" build dnfui dnfui-service dnfui-tests 2>/dev/null || true'\'' EXIT

              dnf -y install \
                appstream \
                catch-devel \
                dbus-daemon \
                desktop-file-utils \
                gcc-c++ \
                git \
                glib2-devel \
                gtk4-devel \
                libdnf5-devel \
                meson \
                ninja-build \
                polkit-devel \
                systemd-devel \
                systemd-rpm-macros

              meson setup build/ci \
                --prefix /usr \
                --libexecdir libexec \
                -Dbuild_tests=true
              meson compile -C build/ci
              desktop-file-validate packaging/com.fedora.dnfui.desktop
              appstreamcli validate --no-net packaging/com.fedora.dnfui.metainfo.xml
              meson test -C build/ci --print-errorlogs

              meson setup build/final \
                --prefix /usr \
                --libexecdir libexec \
                --buildtype release \
                -Dwarning_level=3 \
                -Dfinal_build=true
              meson compile -C build/final
            '

  rpm:
    name: Fedora RPM build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build RPM in Fedora
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD:/workspace" \
            -w /workspace \
            fedora:latest \
            bash -lc '
              set -euo pipefail
              trap '\''chown -R "${HOST_UID}:${HOST_GID}" rpmbuild dnf-ui-latest.rpm dnf-ui-latest.src.rpm 2>/dev/null || true'\'' EXIT

              dnf -y install \
                appstream \
                catch-devel \
                dbus-daemon \
                desktop-file-utils \
                gcc-c++ \
                git \
                glib2-devel \
                gtk4-devel \
                libdnf5-devel \
                make \
                meson \
                ninja-build \
                polkit-devel \
                rpm-build \
                systemd-devel \
                systemd-rpm-macros

              make rpm
              test -L dnf-ui-latest.rpm
              test -L dnf-ui-latest.src.rpm
            '
